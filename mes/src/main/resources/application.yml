server:
  session-timeout: 1800
spring:
  profiles:
    active: dev
  cache:
    type: ehcache
    ehcache:
      config: classpath:config/ehcache.xml

swagger:
  controller: com.wangziyang.mes
  description: MES接口管理
  enable: true
  license: wangziyang
  licenseUrl: https://gitee.com/wangziyangyang/MES-Sprongboot
  title: 王子杨的API 管理
  version: 1.0.0

deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: https://api.deepseek.com
  model: deepseek-chat

# 业务自定义配置
mes:
  captcha:
    enabled: true   # 登录图形验证码校验开关;生产保持 true