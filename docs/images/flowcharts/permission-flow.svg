<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="550" viewBox="0 0 700 550">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#EF9A9A;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="350" y="30" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">RBAC权限校验流程图</text>

  <circle cx="350" cy="80" r="30" fill="url(#startGrad)" filter="url(#shadow)"/>
  <text x="350" y="85" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">用户发起请求</text>

  <line x1="350" y="110" x2="350" y="135" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="145" width="200" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="350" y="173" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Shiro拦截请求</text>

  <line x1="350" y="195" x2="350" y="220" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <polygon points="350,230 270,285 350,340 430,285" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="350" y="278" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">用户是否登录？</text>

  <line x1="270" y="285" x2="100" y="285" stroke="#666" stroke-width="2"/>
  <text x="50" y="288" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">未登录</text>

  <line x1="100" y="285" x2="100" y="330" stroke="#666" stroke-width="2"/>
  <rect x="40" y="340" width="120" height="50" rx="8" ry="8" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="100" y="368" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">重定向到登录页</text>

  <line x1="430" y="285" x2="600" y="285" stroke="#666" stroke-width="2"/>
  <text x="515" y="288" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">已登录</text>

  <line x1="600" y="285" x2="600" y="220" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="165" width="140" height="55" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="570" y="190" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">从Session获取</text>
  <text x="570" y="207" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="white">用户角色列表</text>

  <line x1="570" y="165" x2="570" y="120" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="70" width="140" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="570" y="98" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">查询角色菜单权限</text>

  <line x1="570" y="70" x2="350" y="70" stroke="#666" stroke-width="2"/>
  <rect x="250" y="20" width="200" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="350" y="48" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">获取当前URL权限码</text>

  <line x1="350" y="340" x2="350" y="365" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <polygon points="350,375 270,435 350,495 430,435" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="350" y="425" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">权限是否匹配？</text>

  <line x1="270" y="435" x2="100" y="435" stroke="#666" stroke-width="2"/>
  <text x="50" y="438" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">不匹配</text>

  <line x1="100" y="435" x2="100" y="480" stroke="#666" stroke-width="2"/>
  <rect x="40" y="490" width="120" height="35" rx="5" ry="5" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="100" y="510" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">返回403拒绝访问</text>

  <line x1="430" y="435" x2="600" y="435" stroke="#666" stroke-width="2"/>
  <text x="515" y="438" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">匹配</text>

  <line x1="600" y="435" x2="600" y="475" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="600" cy="495" r="25" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="600" y="500" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">放行请求</text>

</svg>