<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="450" viewBox="0 0 700 450">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#CE93D8;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#EF9A9A;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="350" y="30" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">物理删除流程图（先删子表再删主表）</text>

  <circle cx="350" cy="70" r="35" fill="url(#startGrad)" filter="url(#shadow)"/>
  <text x="350" y="75" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">用户发起删除请求</text>

  <line x1="350" y="105" x2="350" y="130" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="250" y="140" width="200" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="350" y="168" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">开启数据库事务</text>
  <text x="350" y="185" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="white">@Transactional</text>

  <line x1="350" y="190" x2="350" y="215" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="100" y="225" width="200" height="70" rx="8" ry="8" fill="url(#subGrad)" filter="url(#shadow)"/>
  <text x="200" y="253" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">第一步：删除子表数据</text>
  <text x="200" y="273" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="white">DELETE FROM 关联表 WHERE 主表ID</text>
  <text x="200" y="288" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="white">（如sp_group_equipment_rel）</text>

  <line x1="300" y="260" x2="350" y="260" stroke="#666" stroke-width="2"/>
  <line x1="350" y="260" x2="350" y="295" stroke="#666" stroke-width="2"/>

  <rect x="400" y="225" width="200" height="70" rx="8" ry="8" fill="url(#mainGrad)" filter="url(#shadow)"/>
  <text x="500" y="253" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">第二步：删除主表数据</text>
  <text x="500" y="273" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="white">DELETE FROM 主表 WHERE ID</text>
  <text x="500" y="288" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="white">（如sp_equipment_group）</text>

  <line x1="500" y="295" x2="500" y="320" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="400" y="330" width="200" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="500" y="358" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">提交事务</text>

  <line x1="500" y="380" x2="500" y="405" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <circle cx="500" cy="425" r="25" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="500" y="430" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">删除成功</text>

  <line x1="350" y="295" x2="200" y="350" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="200" y="350" x2="200" y="380" stroke="#999" stroke-width="1" stroke-dasharray="5,5"/>

  <rect x="100" y="390" width="200" height="50" rx="8" ry="8" fill="#E0E0E0" filter="url(#shadow)"/>
  <text x="200" y="418" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">异常处理：回滚事务</text>
  <text x="200" y="433" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">rollbackFor = Exception.class</text>

  <text x="350" y="320" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FF9800">原生SQL物理删除</text>
  <text x="350" y="335" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#FF9800">绕过MyBatis-Plus软删除拦截</text>

  <rect x="60" y="140" width="60" height="40" rx="5" ry="5" fill="#E3F2FD" stroke="#90CAF9" stroke-width="2"/>
  <text x="90" y="156" font-family="Microsoft YaHei, sans-serif" font-size="9" text-anchor="middle" fill="#1976D2">外键约束</text>
  <text x="90" y="170" font-family="Microsoft YaHei, sans-serif" font-size="8" text-anchor="middle" fill="#1976D2">必须先删子表</text>

</svg>