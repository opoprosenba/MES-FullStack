<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#EF9A9A;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="300" y="30" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">用户登录流程图</text>

  <circle cx="300" cy="80" r="30" fill="url(#startGrad)" filter="url(#shadow)"/>
  <text x="300" y="85" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">开始</text>

  <line x1="300" y="110" x2="300" y="135" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="200" y="145" width="200" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="300" y="173" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">用户输入用户名和密码</text>

  <line x1="300" y="195" x2="300" y="220" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="200" y="230" width="200" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="300" y="258" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">前端验证输入格式</text>

  <line x1="300" y="280" x2="300" y="305" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <polygon points="300,315 230,365 300,415 370,365" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="300" y="355" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">格式是否正确？</text>
  <text x="300" y="372" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="white">（非空、格式正确）</text>

  <line x1="230" y="365" x2="100" y="365" stroke="#666" stroke-width="2"/>
  <text x="60" y="368" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">否</text>
  <line x1="100" y="365" x2="100" y="170" stroke="#666" stroke-width="2"/>
  <line x1="100" y="170" x2="200" y="170" stroke="#666" stroke-width="2"/>

  <line x1="370" y="365" x2="500" y="365" stroke="#666" stroke-width="2"/>
  <text x="435" y="368" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">是</text>

  <line x1="500" y="365" x2="500" y="300" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="420" y="250" width="140" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="490" y="278" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">调用后端登录接口</text>

  <line x1="490" y="250" x2="490" y="200" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="420" y="150" width="140" height="50" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="490" y="178" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Shiro认证用户</text>

  <line x1="490" y="150" x2="490" y="115" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <polygon points="490,105 430,65 490,35 550,65" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="490" y="58" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">认证是否成功？</text>

  <line x1="430" y="65" x2="250" y="65" stroke="#666" stroke-width="2"/>
  <text x="340" y="68" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">否</text>

  <line x1="250" y="65" x2="250" y="115" stroke="#666" stroke-width="2"/>
  <rect x="180" y="125" width="140" height="40" rx="5" ry="5" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="250" y="148" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">返回错误提示</text>

  <line x1="550" y="65" x2="550" y="115" stroke="#666" stroke-width="2"/>
  <text x="550" y="68" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">是</text>

  <rect x="500" y="125" width="100" height="40" rx="5" ry="5" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="550" y="148" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">登录成功</text>

  <line x1="550" y="165" x2="550" y="200" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="210" width="100" height="35" rx="5" ry="5" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="550" y="232" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">生成Session</text>

  <line x1="550" y="245" x2="550" y="280" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="290" width="100" height="35" rx="5" ry="5" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="550" y="312" font-family="Microsoft YaHei, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="white">获取权限菜单</text>

  <line x1="550" y="325" x2="550" y="360" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="550" cy="375" r="22" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="550" y="380" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">进入系统</text>

</svg>