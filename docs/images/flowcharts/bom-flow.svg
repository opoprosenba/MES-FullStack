<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="650" viewBox="0 0 800 650">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="processGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#EF9A9A;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="400" y="30" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">产品BOM编制流程图</text>

  <circle cx="400" cy="80" r="30" fill="url(#startGrad)" filter="url(#shadow)"/>
  <text x="400" y="85" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">开始</text>

  <line x1="400" y="110" x2="400" y="135" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="145" width="200" height="60" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="400" y="173" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">填写BOM基本信息</text>
  <text x="400" y="192" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="white">BOM代码、名称、版本、关联产品</text>

  <line x1="400" y="205" x2="400" y="230" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="240" width="200" height="60" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="400" y="268" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">添加根节点</text>
  <text x="400" y="287" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="white">选择节点类型（产品/半成品/组件）</text>

  <line x1="400" y="300" x2="400" y="325" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <polygon points="400,335 320,395 400,455 480,395" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="400" y="385" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">是否添加子节点？</text>

  <line x1="320" y="395" x2="150" y="395" stroke="#666" stroke-width="2"/>
  <text x="100" y="398" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">否</text>

  <line x1="480" y="395" x2="650" y="395" stroke="#666" stroke-width="2"/>
  <text x="565" y="398" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">是</text>

  <line x1="650" y="395" x2="650" y="330" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="550" y="270" width="140" height="60" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="620" y="295" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">选中父节点</text>
  <text x="620" y="312" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="white">点击添加子节点</text>

  <line x1="620" y="270" x2="620" y="220" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="550" y="160" width="140" height="60" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="620" y="185" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">选择零部件</text>
  <text x="620" y="202" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="white">输入数量</text>

  <line x1="620" y="160" x2="400" y="160" stroke="#666" stroke-width="2"/>

  <line x1="150" y="395" x2="150" y="450" stroke="#666" stroke-width="2"/>

  <rect x="80" y="460" width="140" height="60" rx="8" ry="8" fill="url(#processGrad)" filter="url(#shadow)"/>
  <text x="150" y="488" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">调整节点顺序</text>
  <text x="150" y="507" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="white">拖拽调整层级和顺序</text>

  <line x1="150" y="520" x2="150" y="550" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="150" cy="570" r="25" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="150" y="575" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">保存BOM</text>

  <line x1="400" y="455" x2="400" y="485" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <polygon points="400,495 320,555 400,615 480,555" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="400" y="545" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">是否发布BOM？</text>

  <line x1="320" y="555" x2="250" y="555" stroke="#666" stroke-width="2"/>
  <text x="220" y="558" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">否</text>

  <line x1="480" y="555" x2="650" y="555" stroke="#666" stroke-width="2"/>
  <text x="565" y="558" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">是</text>

  <line x1="650" y="555" x2="650" y="585" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="580" y="595" width="140" height="40" rx="8" ry="8" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="650" y="618" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">BOM发布成功</text>
  <text x="650" y="635" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="white">（状态变为已发布，不可修改）</text>

</svg>