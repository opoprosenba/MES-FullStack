<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="500" viewBox="0 0 700 500">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="backupGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="restoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="decisionGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#CE93D8;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="endGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F44336;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#EF9A9A;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>

  <text x="350" y="30" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">数据备份与恢复流程图</text>

  <circle cx="350" cy="80" r="30" fill="url(#startGrad)" filter="url(#shadow)"/>
  <text x="350" y="85" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">开始</text>

  <line x1="350" y="110" x2="350" y="135" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>

  <polygon points="350,145 270,205 350,265 430,205" fill="url(#decisionGrad)" filter="url(#shadow)"/>
  <text x="350" y="195" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white">操作类型？</text>

  <line x1="270" y="205" x2="100" y="205" stroke="#666" stroke-width="2"/>
  <text x="50" y="208" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">备份</text>

  <line x1="430" y="205" x2="600" y="205" stroke="#666" stroke-width="2"/>
  <text x="515" y="208" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">恢复</text>

  <line x1="100" y="205" x2="100" y="250" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="30" y="260" width="140" height="50" rx="8" ry="8" fill="url(#backupGrad)" filter="url(#shadow)"/>
  <text x="100" y="288" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">选择备份类型</text>

  <line x1="100" y="310" x2="100" y="340" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="30" y="350" width="140" height="50" rx="8" ry="8" fill="url(#backupGrad)" filter="url(#shadow)"/>
  <text x="100" y="378" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">执行mysqldump</text>

  <line x1="100" y="400" x2="100" y="430" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="30" y="440" width="140" height="40" rx="8" ry="8" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="100" y="463" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">备份成功</text>

  <line x1="600" y="205" x2="600" y="250" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="530" y="260" width="140" height="50" rx="8" ry="8" fill="url(#restoreGrad)" filter="url(#shadow)"/>
  <text x="600" y="288" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">选择备份文件</text>

  <line x1="600" y="310" x2="600" y="340" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="530" y="350" width="140" height="50" rx="8" ry="8" fill="url(#restoreGrad)" filter="url(#shadow)"/>
  <text x="600" y="378" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">执行mysql导入</text>

  <line x1="600" y="400" x2="600" y="430" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="530" y="440" width="140" height="40" rx="8" ry="8" fill="url(#endGrad)" filter="url(#shadow)"/>
  <text x="600" y="463" font-family="Microsoft YaHei, sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="white">恢复成功</text>

  <rect x="250" y="280" width="200" height="80" rx="8" ry="8" fill="#E3F2FD" stroke="#90CAF9" stroke-width="2"/>
  <text x="350" y="305" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#1976D2">备份策略</text>
  <text x="350" y="325" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#1976D2">全量备份：每天凌晨2点</text>
  <text x="350" y="340" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#1976D2">增量备份：每小时一次</text>

  <rect x="250" y="380" width="200" height="65" rx="8" ry="8" fill="#FFF3E0" stroke="#FFB74D" stroke-width="2"/>
  <text x="350" y="403" font-family="Microsoft YaHei, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#E65100">存储位置</text>
  <text x="350" y="420" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#E65100">本地：/backup/mysql/</text>
  <text x="350" y="435" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#E65100">远程：NFS共享存储</text>

</svg>