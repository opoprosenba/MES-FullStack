<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="layerGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8BC34A;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="layerGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2196F3;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#64B5F6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="layerGrad3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF9800;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#FFB74D;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="layerGrad4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9C27B0;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#CE93D8;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <text x="450" y="30" font-family="Microsoft YaHei, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#333">MES制造执行系统架构图</text>

  <rect x="50" y="50" width="800" height="140" rx="10" ry="10" fill="url(#layerGrad1)" filter="url(#shadow)"/>
  <text x="450" y="80" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">应用层 (Application Layer)</text>
  
  <rect x="70" y="100" width="150" height="60" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="145" y="122" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">系统管理</text>
  <text x="145" y="140" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">用户/角色/菜单/部门</text>
  
  <rect x="240" y="100" width="150" height="60" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="315" y="122" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">基础数据</text>
  <text x="315" y="140" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">物料/设备/库房/加工单元</text>
  
  <rect x="410" y="100" width="150" height="60" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="485" y="122" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">工艺管理</text>
  <text x="485" y="140" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">BOM/工序/流程/工艺内容</text>
  
  <rect x="580" y="100" width="150" height="60" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="655" y="122" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">生产订单</text>
  <text x="655" y="140" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">工单/计划/调度</text>
  
  <rect x="750" y="100" width="80" height="60" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="790" y="122" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">数字化平台</text>
  <text x="790" y="140" font-family="Microsoft YaHei, sans-serif" font-size="9" text-anchor="middle" fill="#666">大屏/3D仿真</text>

  <path d="M450 190 L450 210" stroke="#999" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="450" cy="215" r="8" fill="#666"/>

  <rect x="50" y="230" width="800" height="120" rx="10" ry="10" fill="url(#layerGrad2)" filter="url(#shadow)"/>
  <text x="450" y="260" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">平台层 (Platform Layer)</text>
  
  <rect x="70" y="280" width="760" height="50" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="450" y="308" font-family="Microsoft YaHei, sans-serif" font-size="14" text-anchor="middle" fill="#333">Spring Boot 2.1.7 + MyBatis-Plus 3.1.2 + Apache Shiro 1.4.0</text>
  
  <rect x="70" y="340" width="140" height="40" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="140" y="362" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">用户认证</text>
  
  <rect x="220" y="340" width="140" height="40" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="290" y="362" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">权限控制</text>
  
  <rect x="370" y="340" width="140" height="40" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="440" y="362" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">数据校验</text>
  
  <rect x="520" y="340" width="140" height="40" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="590" y="362" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">事务管理</text>
  
  <rect x="670" y="340" width="160" height="40" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="750" y="362" font-family="Microsoft YaHei, sans-serif" font-size="11" text-anchor="middle" fill="#333">缓存管理 (Redis/Ehcache)</text>

  <path d="M450 390 L450 410" stroke="#999" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="450" cy="415" r="8" fill="#666"/>

  <rect x="50" y="430" width="800" height="100" rx="10" ry="10" fill="url(#layerGrad3)" filter="url(#shadow)"/>
  <text x="450" y="460" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">网络层 (Network Layer)</text>
  
  <rect x="70" y="480" width="760" height="40" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="450" y="504" font-family="Microsoft YaHei, sans-serif" font-size="14" text-anchor="middle" fill="#333">RESTful API + WebSocket + HTTP/2 + CORS</text>

  <path d="M450 530 L450 550" stroke="#999" stroke-width="3" stroke-dasharray="5,5"/>
  <circle cx="450" cy="555" r="8" fill="#666"/>

  <rect x="50" y="570" width="800" height="120" rx="10" ry="10" fill="url(#layerGrad4)" filter="url(#shadow)"/>
  <text x="450" y="600" font-family="Microsoft YaHei, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="white">设备层 (Device Layer)</text>
  
  <rect x="100" y="620" width="120" height="50" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="160" y="642" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">生产设备</text>
  <text x="160" y="658" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">CNC/PLC/机器人</text>
  
  <rect x="240" y="620" width="120" height="50" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="300" y="642" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">检测设备</text>
  <text x="300" y="658" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">质检仪/传感器</text>
  
  <rect x="380" y="620" width="120" height="50" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="440" y="642" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">仓储设备</text>
  <text x="440" y="658" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">AGV/立体仓库</text>
  
  <rect x="520" y="620" width="120" height="50" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="580" y="642" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">监控设备</text>
  <text x="580" y="658" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">摄像头/温湿度</text>
  
  <rect x="660" y="620" width="120" height="50" rx="5" ry="5" fill="white" opacity="0.9"/>
  <text x="720" y="642" font-family="Microsoft YaHei, sans-serif" font-size="12" text-anchor="middle" fill="#333">数据采集网关</text>
  <text x="720" y="658" font-family="Microsoft YaHei, sans-serif" font-size="10" text-anchor="middle" fill="#666">Modbus/OPC UA</text>
</svg>